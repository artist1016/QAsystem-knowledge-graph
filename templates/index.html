<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能小助手</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/static/images/bg.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #chatbox {
            position: relative;
            width: 80%;
            height: 80vh;
            max-width: 1000px;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        #chatbox h2 {
            margin: 0;
            padding: 20px;
            background-color: #4CAF50;
            color: #fff;
            text-align: center;
            font-size: 1.5rem;
        }
        #outputArea {
            position: absolute;
            top: 50px;
            bottom: 50px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 10px;
            background-color: #f9f9f9;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            animation: fade-in 0.5s ease;
        }
        .question, .answer {
            position: relative;
            margin-bottom: 10px;
            margin-left: 20px;
            margin-right: 20px;
            padding: 5px;
            border-radius: 8px;
            background-color: #e5e5ea;
            animation: slide-in 0.5s ease;
        }
        .question:before, .answer:before {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }
        .question:before {
            content: "";
            position: absolute;
            top: 0;
            right: -30px;
            width: 25px;
            height: 25px;
            background-image: url('/static/images/user.png');
            background-size: cover;
            border-radius: 50%;
        }
        .answer:before {
            content: "";
            position: absolute;
            top: 0;
            left: -30px;
            width: 30px;
            height: 30px;
            background-image: url('/static/images/小助手.png');
            background-size: cover;
            border-radius: 50%;
        }
        .question p, .answer p {
            margin: 0;
            color: #333;
        }
        .question p {
            text-align: right;
        }
        #inputField {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slide-in {
            from { transform: translateY(-20px); }
            to { transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div id="chatbox">
        <h2>应急事件知识图谱问答系统</h2>
        <div id="outputArea"></div>
        <input type="text" id="inputField" placeholder="请输入您的问题（例如：发生火灾怎么办）">
    </div>

    <script>
        document.getElementById('inputField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                askQuestion();
            }
        });

        function askQuestion() {
            var question = document.getElementById('inputField').value.trim();
            if (question === '') {
                return;
            }

            var xhr = new XMLHttpRequest();
            xhr.open('POST', 'http://localhost:5000/ask', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var response = JSON.parse(xhr.responseText);
                    displayQuestion(question);
                    displayAnswer(response.answer);
                }
            };
            xhr.send(JSON.stringify({ question: question }));
            document.getElementById('inputField').value = '';
        }

        function displayQuestion(question) {
            var outputArea = document.getElementById('outputArea');
            var questionDiv = document.createElement('div');
            questionDiv.classList.add('question');
            var questionText = document.createElement('p');
            questionText.textContent = question;
            questionDiv.appendChild(questionText);
            outputArea.appendChild(questionDiv);
            outputArea.scrollTop = outputArea.scrollHeight;
            addTimeStamp(questionDiv);
        }

        function displayAnswer(answer) {
            var outputArea = document.getElementById('outputArea');
            var answerDiv = document.createElement('div');
            answerDiv.classList.add('answer');
            var answerText = document.createElement('p');
            answerText.textContent = answer;
            answerDiv.appendChild(answerText);
            outputArea.appendChild(answerDiv);
            outputArea.scrollTop = outputArea.scrollHeight;
            addTimeStamp(answerDiv);
        }

        function addTimeStamp(element) {
            var timeStamp = document.createElement('span');
            timeStamp.textContent = getCurrentTime();
            timeStamp.style.fontSize = '0.8rem';
            timeStamp.style.color = '#777';
            timeStamp.style.float = 'right';
            element.appendChild(timeStamp);
        }

        function getCurrentTime() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            return padZero(hours) + ':' + padZero(minutes) + ':' + padZero(seconds);
        }

        function padZero(num) {
            return (num < 10 ? '0' : '') + num;
        }
    </script>

    <script>
        // 获取对话框元素
        var chatbox = document.getElementById('chatbox');

        // 初始化鼠标偏移量
        var offsetX, offsetY;

        // 当鼠标按下时触发的事件处理函数
        chatbox.addEventListener('mousedown', function(e) {
            // 计算鼠标相对于对话框左上角的偏移量
            offsetX = e.clientX;
            offsetY = e.clientY;

            // 鼠标移动事件处理函数
            document.addEventListener('mousemove', onMouseMove);

            // 鼠标释放事件处理函数
            document.addEventListener('mouseup', onMouseUp);
        });

        // 鼠标移动事件处理函数
        function onMouseMove(e) {
            // 计算对话框的新位置
            var newX = e.clientX - offsetX;
            var newY = e.clientY - offsetY;

            // 设置对话框的新位置
            chatbox.style.left = newX + 'px';
            chatbox.style.top = newY + 'px';
        }

        // 鼠标释放事件处理函数
        function onMouseUp() {
            // 移除鼠标移动事件处理函数
            document.removeEventListener('mousemove', onMouseMove);

            // 移除鼠标释放事件处理函数
            document.removeEventListener('mouseup', onMouseUp);
        }
    </script>


</body>
</html>
